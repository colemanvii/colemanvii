<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>COLEMANVII — ROUTER</title>

  <style>
    :root{
      --page-bg:#e7ddce;
      --page-grad-1:rgba(255,255,255,.30);
      --page-grad-2:rgba(0,0,0,.04);

      --card-bg:#efe4d6;
      --card-outline:rgba(0,0,0,.10);
      --hairline:rgba(0,0,0,.11);

      --text:#111;
      --muted:rgba(0,0,0,.58);

      --shadow: 0 35px 90px rgba(0,0,0,.16);
      --shadow-soft: 0 16px 40px rgba(0,0,0,.10);

      --radius-outer:34px;
      --radius-card:28px;

      --accent:#d58b55; /* router dot */
      --chev:rgba(0,0,0,.35);
      --hover:rgba(0,0,0,.04);

      --track:rgba(255,255,255,.20);
    }

    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;}

    body{
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",system-ui,sans-serif;
      color:var(--text);
      background:
        radial-gradient(1200px 800px at 40% 20%, var(--page-grad-1), transparent 60%),
        radial-gradient(900px 700px at 60% 85%, var(--page-grad-2), transparent 55%),
        var(--page-bg);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:28px 18px;
    }

    .stage{
      width:min(520px, 92vw);
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .shell{
      width:min(420px, 92vw);
      background:rgba(255,255,255,.10);
      border:1px solid rgba(255,255,255,.16);
      border-radius:var(--radius-outer);
      padding:20px;
      box-shadow:var(--shadow);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .card{
      background:var(--card-bg);
      border:1px solid var(--card-outline);
      border-radius:var(--radius-card);
      box-shadow:var(--shadow-soft);
      padding:18px 18px 14px;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:4px 2px 14px;
      border-bottom:1px solid var(--hairline);
      margin-bottom:6px;
    }

    .brand{
      font-size:13px;
      letter-spacing:.28em;
      text-transform:uppercase;
      color:var(--muted);
      font-weight:650;
    }

    .status{
      display:flex;
      align-items:center;
      gap:10px;
      font-size:13px;
      letter-spacing:.26em;
      text-transform:uppercase;
      color:var(--muted);
      font-weight:650;
    }

    .dot{
      width:8px;height:8px;border-radius:999px;
      background:var(--accent);
      box-shadow:0 0 0 3px rgba(213,139,85,.15);
      transform:translateY(-1px);
    }

    .list{
      margin-top:10px;
    }

    .row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:18px 4px;
      text-decoration:none;
      color:inherit;
      border-bottom:1px solid var(--hairline);
      border-radius:14px;
      transition:background .12s ease, transform .12s ease, opacity .12s ease;
    }
    .row:hover{
      background:var(--hover);
      transform:translateY(-1px);
    }
    .row:active{
      transform:translateY(0px);
      opacity:.9;
    }
    .row:last-child{
      border-bottom:none;
    }

    .left{
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .title{
      font-size:22px;
      letter-spacing:.26em;
      text-transform:uppercase;
      font-weight:800;
      line-height:1.05;
    }

    .subtitle{
      font-size:14px;
      color:var(--muted);
      letter-spacing:.02em;
      line-height:1.2;
    }

    .chev{
      font-size:26px;
      color:var(--chev);
      line-height:1;
      transform:translateY(-1px);
      padding-left:12px;
      user-select:none;
    }

    .footer{
      margin-top:14px;
      padding-top:14px;
      border-top:1px solid var(--hairline);
      display:flex;
      align-items:center;
      justify-content:space-between;
      font-size:14px;
      color:var(--muted);
      letter-spacing:.06em;
      text-transform:uppercase;
    }

    .footer a{
      color:inherit;
      text-decoration:none;
      transition:opacity .12s ease;
    }
    .footer a:hover{opacity:.75;}

    /* Small refinement for very narrow screens */
    @media (max-width: 360px){
      .title{font-size:20px;}
      .subtitle{font-size:13px;}
      .card{padding:16px 14px 12px;}
      .shell{padding:16px;}
    }
  </style>
</head>

<body>
  <div class="stage">
    <div class="shell">
      <div class="card">

        <div class="topbar">
          <div class="brand">COLEMANVII</div>
          <div class="status">
            <span class="dot" aria-hidden="true"></span>
            <span>ROUTER</span>
          </div>
        </div>

        <div class="list">
          <a class="row" href="https://westovr.substack.com/" target="_blank" rel="noopener">
            <div class="left">
              <div class="title">WESTOVER</div>
              <div class="subtitle">writing</div>
            </div>
            <div class="chev">›</div>
          </a>

          <a class="row" href="/monk">
            <div class="left">
              <div class="title">MONK</div>
              <div class="subtitle">film · building</div>
            </div>
            <div class="chev">›</div>
          </a>

          <a class="row" href="https://github.com/colemanvii" target="_blank" rel="noopener">
            <div class="left">
              <div class="title">GITHUB</div>
              <div class="subtitle">system log</div>
            </div>
            <div class="chev">›</div>
          </a>

          <a class="row" href="/portal">
            <div class="left">
              <div class="title">CLIENT PORTAL</div>
              <div class="subtitle">secure workspace</div>
            </div>
            <div class="chev">›</div>
          </a>
        </div>

        <div class="footer">
          <div>© 2026 COLEMANVII</div>
          <a href="mailto:colecalfee@gmail.com">CONTACT</a>
        </div>

      </div>
    </div>
  </div>
</body>
</html>
