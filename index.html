<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>COLEMANVII</title>

<style>

:root{
--page-bg:#d9cfc0;
--outer-bg:rgba(255,255,255,.10);
--card-bg:#efe4d6;
--card-outline:rgba(0,0,0,.08);
--hairline:rgba(0,0,0,.10);
--text:#111;
--muted:rgba(0,0,0,.55);
--shadow-1:0 40px 90px rgba(0,0,0,.14);
--shadow-2:0 12px 30px rgba(0,0,0,.10);
--dot:#d48c55;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
}

html,body{
height:100%;
}

body{
background:var(--page-bg);
color:var(--text);
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",system-ui,sans-serif;
display:flex;
align-items:center;
justify-content:center;
padding:28px 18px;
}

.stage{
width:min(420px,92vw);
}

.outer{
background:var(--outer-bg);
border-radius:30px;
padding:18px;
box-shadow:var(--shadow-1);
}

.card{
background:var(--card-bg);
border-radius:22px;
border:1px solid var(--card-outline);
box-shadow:var(--shadow-2);
padding:18px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding-bottom:14px;
border-bottom:1px solid var(--hairline);
margin-bottom:6px;
}

.brand{
font-size:12px;
letter-spacing:.28em;
text-transform:uppercase;
color:var(--muted);
font-weight:650;
}

.router{
display:flex;
align-items:center;
gap:10px;
font-size:12px;
letter-spacing:.28em;
text-transform:uppercase;
color:var(--muted);
font-weight:650;
}

.dot{
width:8px;
height:8px;
border-radius:50%;
background:var(--dot);
}

.list{
margin-top:10px;
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
padding:16px 6px;
border-bottom:1px solid var(--hairline);
text-decoration:none;
color:inherit;
transition:opacity .15s ease;
}

.row:last-of-type{
border-bottom:none;
}

.row:hover{
opacity:.75;
}

.title{
font-size:22px;
letter-spacing:.26em;
font-weight:800;
text-transform:uppercase;
}

.subtitle{
margin-top:6px;
font-size:14px;
color:var(--muted);
}

.chev{
font-size:22px;
color:var(--muted);
transform:translateY(-2px);
}

.footer{
margin-top:14px;
padding-top:14px;
border-top:1px solid var(--hairline);
display:flex;
justify-content:space-between;
font-size:14px;
color:var(--muted);
letter-spacing:.04em;
}

.footer a{
text-decoration:none;
color:inherit;
}

.footer a:hover{
opacity:.75;
}

</style>
</head>

<body>

<div class="stage">

<div class="outer">

<div class="card">

<div class="topbar">
<div class="brand">COLEMANVII</div>

<div class="router">
<div class="dot"></div>
<div>ROUTER</div>
</div>
</div>

<div class="list">

<a class="row" href="https://westovr.substack.com/" target="_blank">
<div>
<div class="title">WESTOVER</div>
<div class="subtitle">writing</div>
</div>
<div class="chev">›</div>
</a>

<!-- UPDATED: trailing slash -->
<a class="row" href="https://colemanvii.github.io/monk/" target="_blank">
<div>
<div class="title">MONK</div>
<div class="subtitle">film · building</div>
</div>
<div class="chev">›</div>
</a>

<a class="row" href="https://github.com/colemanvii" target="_blank">
<div>
<div class="title">GITHUB</div>
<div class="subtitle">system log</div>
</div>
<div class="chev">›</div>
</a>

<a class="row" href="/portal">
<div>
<div class="title">CLIENT PORTAL</div>
<div class="subtitle">secure workspace</div>
</div>
<div class="chev">›</div>
</a>

</div>

<div class="footer">
<div>© 2026 COLEMANVII</div>
<a href="mailto:colecalfee@gmail.com">CONTACT</a>
</div>

</div>
</div>
</div>

</body>
</html>
